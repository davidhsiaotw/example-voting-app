<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Docker Example Voting App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Use a simple modern CSS framework for a nice UI -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
    .vote-btn { padding: 15px; font-size: 1.2rem; border-radius: 8px; transition: transform 0.2s; }
    .vote-btn:hover { transform: scale(1.02); }
    .vote-btn.selected { border: 3px solid #000; font-weight: bold; }
    .progress { height: 25px; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="container py-5">
    <h1 class="text-center mb-5"><i class="fas fa-vote-yea text-primary"></i> Real-time Voting System</h1>
    
    <div class="row">
      <!-- Vote Panel -->
      <div class="col-md-6 mb-4">
        <div class="card h-100">
          <div class="card-header bg-primary text-white text-center rounded-top">
            <h3 class="mb-0">Cast Your Vote</h3>
          </div>
          <div class="card-body d-flex flex-column justify-content-center text-center p-4">
            <h4 class="mb-4" id="vote-title">Loading options...</h4>
            
            <div class="d-grid gap-3">
              <button class="btn btn-outline-info vote-btn" id="btn-a" onclick="submitVote('a')">
                <span id="label-a">Option A</span>
              </button>
              <button class="btn btn-outline-success vote-btn" id="btn-b" onclick="submitVote('b')">
                <span id="label-b">Option B</span>
              </button>
            </div>
            
            <p class="mt-4 text-muted small" id="hostname-display"></p>
          </div>
        </div>
      </div>

      <!-- Results Panel -->
      <div class="col-md-6 mb-4">
        <div class="card h-100">
          <div class="card-header bg-dark text-white text-center rounded-top">
            <h3 class="mb-0">Live Results</h3>
          </div>
          <div class="card-body p-4">
            <div id="results-container">
              <p class="text-center text-muted">Waiting for results...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let optionA = "Option A";
    let optionB = "Option B";

    // 1. Fetch Options
    fetch('/api/options')
      .then(res => res.json())
      .then(data => {
        optionA = data.option_a;
        optionB = data.option_b;
        document.getElementById('vote-title').innerText = `${optionA} vs ${optionB}!`;
        document.getElementById('label-a').innerText = optionA;
        document.getElementById('label-b').innerText = optionB;
        document.getElementById('hostname-display').innerText = `Processed by container ID: ${data.hostname}`;
      })
      .catch(err => console.error("Error fetching options:", err));

    // 2. Submit Vote
    function submitVote(choice) {
      fetch('/api/vote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vote: choice })
      })
      .then(res => res.json())
      .then(data => {
        if(data.success) {
           document.getElementById('btn-a').classList.remove('selected', 'btn-info');
           document.getElementById('btn-b').classList.remove('selected', 'btn-success');
           
           if(choice === 'a') {
             document.getElementById('btn-a').classList.add('selected', 'btn-info');
             document.getElementById('btn-a').classList.remove('btn-outline-info');
             document.getElementById('btn-b').classList.add('btn-outline-success');
           } else {
             document.getElementById('btn-b').classList.add('selected', 'btn-success');
             document.getElementById('btn-b').classList.remove('btn-outline-success');
             document.getElementById('btn-a').classList.add('btn-outline-info');
           }
        }
      });
    }

    // 3. Listen for Results via WebSocket
    const socket = io();
    socket.on('scores', function (data) {
      const scores = JSON.parse(data);
      const total = (scores.a || 0) + (scores.b || 0);
      const pctA = total === 0 ? 50 : Math.round((scores.a / total) * 100);
      const pctB = total === 0 ? 50 : 100 - pctA;

      const html = `
        <div class="mb-4">
          <div class="d-flex justify-content-between mb-1">
            <strong>${optionA}</strong>
            <span>${pctA}% (${scores.a || 0} votes)</span>
          </div>
          <div class="progress">
            <div class="progress-bar bg-info" role="progressbar" style="width: ${pctA}%" aria-valuenow="${pctA}" aria-valuemin="0" aria-valuemax="100"></div>
          </div>
        </div>
        <div>
          <div class="d-flex justify-content-between mb-1">
            <strong>${optionB}</strong>
            <span>${pctB}% (${scores.b || 0} votes)</span>
          </div>
          <div class="progress">
            <div class="progress-bar bg-success" role="progressbar" style="width: ${pctB}%" aria-valuenow="${pctB}" aria-valuemin="0" aria-valuemax="100"></div>
          </div>
        </div>
        <p class="text-center mt-4 text-muted">Total Votes: ${total}</p>
      `;
      document.getElementById('results-container').innerHTML = html;
    });
  </script>
</body>
</html>
